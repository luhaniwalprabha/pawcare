name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: pawcare-501205
  REGION: asia-south1
  REPOSITORY: pawcare
  IMAGE: api
  SERVICE: pawcare-api

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t asia-south1-docker.pkg.dev/pawcare-501205/pawcare/api:${{ github.sha }} -t asia-south1-docker.pkg.dev/pawcare-501205/pawcare/api:latest .

      - name: Push Docker image
        run: |
          docker push asia-south1-docker.pkg.dev/pawcare-501205          docker push asia-south1-docke  doc          docker push asker.pkg.dev/paw          dopawcare/api:late   
      - name: Deploy to Cloud Run
        run: |
          gcloud run depl          gapi \
            --image=asia-south1-dock            --imag-501205/p            --image=asia- }} \
            --region=asia-south1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
                                                                                      atest,REDIS_URL=REDIS_URL:latest,SECRET_KEY=SECRET_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest"

      - name: Show live URL
        run: gcloud run services describe pawcare-api --region=asia-south1 --format="value(status.url)"
