name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build API image
        run: docker build -t asia-south1-docker.pkg.dev/pawcare-501205/pawcare/api:latest .

      - name: Build Celery worker image
        run: docker build -f Dockerfile.celery -t asia-south1-docker.pkg.dev/pawcare-501205/pawcare/celery-worker:latest .

      - name: Push API image
        run: docker push asia-south1-docker.pkg.dev/pawcare-501205/pawcare/api:latest

      - name: Push Celery worker image
        run: docker push asia-south1-docker.pkg.dev/pawcare-501205/pawcare/celery-worker:latest

      - name: Deploy API to Cloud Run
        run: gcloud run deploy pawcare-api --image=asia-south1-docker.pkg.dev/pawcare-501205/pawcare/api:latest --region=asia-south1 --platform=managed --allow-unauthenticated --port=8000 --memory=512Mi --cpu=1 --min-instances=0 --max-instances=3 --set-secrets="DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,SECRET_KEY=SECRET_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest"

      - name: Deploy Celery worker to Cloud Run
        run: gcloud run deploy pawcare-celery-worker --image=asia-south1-docker.pkg.dev/pawcare-501205/pawcare/celery-worker:latest --region=asia-south1 --platform=managed --no-allow-unauthenticated --port=8080 --memory=512Mi --cpu=1 --min-instances=1 --max-instances=1 --set-secrets="DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,SECRET_KEY=SECRET_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest"

      - name: Show live URLs
        run: |
          echo "API:" && gcloud run services describe pawcare-api --region=asia-south1 --format="value(status.url)"
          echo "Worker:" && gcloud run services describe pawcare-celery-worker --region=asia-south1 --format="value(status.url)"
